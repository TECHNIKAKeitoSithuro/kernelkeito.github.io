<!DOCTYPE html>
<html>
<title>Forms</title>
<head>
<body>
<div>
    <form>
        <label for="fname">first name:</label>
    <input type="text" id="fname" name="fname" placeholder="Placeholder" required>
</div>
<br>    
<div>
    <label for="lname">last name:</label>
    <input type="text" id="lname" name="lname" placeholder="Placeholder 2">
 </div>   

 <br>    
<div>
    <label for="pass">password:</label>
    <input type="password" id="pass" name="pass" placeholder="Password Please" maxlength="16">
 </div>   

 <br>    
<div>
    <label for="email">email:</label>
    <input type="email" id="email" name="email" placeholder="Email Please">
 </div>   

<br>    
<div>
    <label for="phone">phone #:</label>
    <input type="email" id="phone" name="phone" placeholder="Phone please?">
 </div>   

<br>    
<div>
    <label for="bday">birthdate:</label>
    <input type="date" id="bdate" name="bdate">
 </div>   

<br>    
<div>
    <label for="quantity">quantity:</label>
    <input type="number" id="quantity" name="quantity" min="0" max="99" value="1">
 </div>   

 <div>
    <label for="title">title:</label>

    <label for="Mr.">Mr.</label>
    <input type="radio" id="Mr." name="title" value="Mr.">

    <label for="Mrs.">Mrs.</label>
    <input type="radio" id="Mrs." name="title" value="Mrs.">

    <label for="PhD.">PhD.</label>
    <input type="radio" id="PhD." name="title" value="PhD.">
</div>

<div>
    <Label for="payement">payement:</Label>
        <select name="payement" id="payement">
        <option value="Visa">Visa</option>
        <option value="Mastercard">Mastercard</option>
        <option value="Pix">Pix</option>
</select>
</div>

<div>
    <label for="subscribe">Subscribe:</label>
    <input type="checkbox" id="subscribe" name="subscribe">

</div>

<div>
    <input type="reset">
</div>

<br>

<div>
    <input type="submit">
</div>

</form>

</a>
</body>
</head>

</html>
